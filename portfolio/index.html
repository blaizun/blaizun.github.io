            <!--
                GALLERY — how to add another file:

                STATIC IMAGE or GIF — identical either way, animated gifs
                just play natively inside <img>:
                        <figure class="portfolio-item">
                            <img src="assets/your-file.webp" alt="Project title" loading="lazy">
                            <figcaption class="item-caption"><h3>Project title</h3></figcaption>
                        </figure>
                    (add <span class="media-badge">GIF</span> as a sibling of
                    the <img> if you want the format badge)

                PDF — a raw PDF can't sit inside <img>, so it's wrapped in a
                link to the file with a preview-image thumbnail:
                        <figure class="portfolio-item" data-type="pdf">
                            <a class="pdf-frame" href="assets/your-file.pdf" target="_blank" rel="noopener">
                                <img src="assets/your-file-preview.webp" alt="Project title (PDF preview)" loading="lazy">
                                <span class="media-badge">PDF</span>
                            </a>
                            <figcaption class="item-caption"><h3>Project title</h3></figcaption>
                        </figure>

                SOFTWARE TAGS — every item has an empty <div class="app-tags">
                slot. Drop one (or more, if a piece used multiple apps) of
                these inside it. These reference the icon sprite defined at
                the top of <body> (same document, not an external file) —
                keep it that way: referencing an external .svg file via
                <use> loses crispness and its colors silently fail to
                apply in Firefox/Safari, since those browsers don't import
                a cross-document <style> block through <use>:
                        <svg class="app-icon" aria-label="Adobe Photoshop"><use href="#icon-ps"></use></svg>
                        <svg class="app-icon" aria-label="Adobe Illustrator"><use href="#icon-ai"></use></svg>
                        <svg class="app-icon" aria-label="Adobe After Effects"><use href="#icon-ae"></use></svg>
                        <svg class="app-icon" aria-label="Adobe InDesign"><use href="#icon-id"></use></svg>
            -->
