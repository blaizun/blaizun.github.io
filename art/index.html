<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Art</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="glass-overlay" id="glassOverlay"></div>
        <a href="../index.html" class="back-home-btn" id="backHomeBtn">
            <span class="arrow">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </span>
            <span>Back Home</span>
        </a>

        <header class="page-header">
            <h1>Art</h1>
        </header>

        <!-- Masonry gallery — CSS columns so images of any size/aspect
             ratio flow in without needing to measure them in JS first -->
        <div class="gallery" id="gallery"></div>

        <!-- Modal for full-size view -->
        <div class="modal" id="modal">
            <span class="modal-close" id="modalClose">&times;</span>
            <img class="modal-content" id="modalImage" alt="Expanded artwork" />
        </div>

        <script>
            const backHomeBtn = document.getElementById("backHomeBtn");
            const glassOverlay = document.getElementById("glassOverlay");

            backHomeBtn.addEventListener("mouseenter", () => {
                glassOverlay.classList.add("active");
            });

            backHomeBtn.addEventListener("mouseleave", () => {
                glassOverlay.classList.remove("active");
            });

            const images = [
                "assets/optimized/art/Charlesvol2.webp",
                "assets/optimized/art/Charlesvol1.webp",
                "assets/optimized/art/Charlesvol3.webp",
                "assets/optimized/art/HomeInvasion.webp",
                "assets/optimized/art/FlowerFarmer.webp",
                "assets/optimized/art/KingofRing1.webp",
                "assets/optimized/art/MAL-1.webp",
                "assets/optimized/art/MAL-2.webp",
                "assets/optimized/art/MAL-3.webp",
                "assets/optimized/art/MAL-4.webp",
                "assets/optimized/art/pugnate2.webp",
                "assets/optimized/art/WheelsFallOffFinal.webp",
                "assets/optimized/art/Windmills3.webp",
                "assets/optimized/art/WLG2REAL.webp",
                "assets/optimized/work/SwankyCover-1.webp",
                "assets/optimized/art/ItsAllUnderControl.webp",
                "assets/optimized/art/happyguppy.webp",
                "assets/optimized/art/BreakupFINAL.webp",
                "assets/optimized/IMGClass/1.webp",
                "assets/optimized/work/CruelOilBlaizunDiamond.webp",
                "assets/optimized/IMGClass/8.webp",
                "assets/optimized/IMGClass/DumbJealous.webp",
                "assets/optimized/IMGClass/FeelsLikeADream.webp",
                "assets/optimized/IMGClass/honestly.webp",
                "assets/optimized/IMGClass/Iknowyouredownbad.webp",
                "assets/optimized/IMGClass/JumpedInTooDeepREALFINAL.webp",
                "assets/optimized/IMGClass/proj7.webp",
                "assets/optimized/IMGClass/proj9.webp",
                "assets/optimized/IMGClass/ReachingOutToMe.webp",
            ];

            const gallery = document.getElementById("gallery");
            const modal = document.getElementById("modal");
            const modalImage = document.getElementById("modalImage");
            const modalClose = document.getElementById("modalClose");

            const revealObserver = new IntersectionObserver(
                (entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add("in-view");
                            revealObserver.unobserve(entry.target);
                        }
                    });
                },
                { threshold: 0.1, rootMargin: "0px 0px -40px 0px" },
            );

            images.forEach((url, index) => {
                const item = document.createElement("figure");
                item.className = "gallery-item";

                const img = document.createElement("img");
                img.src = url;
                img.alt = `Artwork ${index + 1}`;
                img.loading = "lazy";

                item.addEventListener("click", () => {
                    modalImage.src = url;
                    modal.classList.add("active");
                });

                item.appendChild(img);
                gallery.appendChild(item);
                revealObserver.observe(item);
            });

            // Safety net: guarantee the gallery is visible even if the
            // observer never fires (e.g. slow first paint)
            setTimeout(() => {
                document
                    .querySelectorAll(".gallery-item")
                    .forEach((item) => item.classList.add("in-view"));
            }, 1000);

            function closeModal() {
                modal.classList.remove("active");
            }

            modalClose.addEventListener("click", closeModal);
            modal.addEventListener("click", (e) => {
                if (e.target === modal) closeModal();
            });
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeModal();
            });
        </script>
    </body>
</html>
